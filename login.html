<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SojiDa | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#000; color:#fff; display:flex; align-items:center; justify-content:center; height:100vh;">
    <div style="width:90%; text-align:center; background:#111; padding:30px; border-radius:20px; border:1px solid #222;">
        <h1 style="color:#fe2c55; margin-bottom:20px;">SojiDa</h1>
        <input type="email" id="email" placeholder="ইমেইল" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; border:none; background:#222; color:#fff;">
        <input type="password" id="pass" placeholder="পাসওয়ার্ড" style="width:100%; padding:15px; margin-bottom:20px; border-radius:10px; border:none; background:#222; color:#fff;">
        <button onclick="login()" style="width:100%; background:#fe2c55; color:#fff; padding:15px; border:none; border-radius:10px; font-weight:bold;">লগইন</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="app.js"></script>
    <script>
        async function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                await auth.signInWithEmailAndPassword(e, p);
                window.location.href = 'index.html';
            } catch(err) { alert("ভুল ইমেইল বা পাসওয়ার্ড!"); }
        }
    </script>
</body>
</html>
