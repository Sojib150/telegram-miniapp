<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SojiDa | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #000;">

    <div class="auth-container">
        <div class="auth-header">
            <h1>SojiDa</h1>
            <p>স্বাগতম! আবার দেখা হওয়ায় ভালো লাগল।</p>
        </div>

        <div class="auth-card">
            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="log-email" placeholder="আপনার ইমেইল">
            </div>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="log-pass" placeholder="পাসওয়ার্ড">
            </div>
            <button class="auth-btn" style="background: var(--secondary); color: #000;" id="log-submit" onclick="handleLogin()">লগইন করুন</button>
        </div>

        <p class="switch-auth">নতুন ইউজার? <a href="register.html">রেজিস্টার করুন</a></p>
    </div>

    <div id="soji-overlay" class="overlay"></div>
    <div id="soji-alert" class="alert-box"><h3 id="alert-title">SojiDa</h3><p id="alert-msg"></p><button onclick="closeSojiAlert()">ঠিক আছে</button></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>

    <script>
        async function handleLogin() {
            const email = document.getElementById('log-email').value;
            const pass = document.getElementById('log-pass').value;
            const btn = document.getElementById('log-submit');

            if(!email || !pass) return sojiAlert("দয়া করে ইমেইল ও পাসওয়ার্ড দিন।");

            btn.disabled = true;
            btn.innerText = "লগইন হচ্ছে...";

            try {
                await auth.signInWithEmailAndPassword(email, pass);
                location.href = 'index.html';
            } catch (error) {
                sojiAlert("ইমেইল বা পাসওয়ার্ড ভুল হয়েছে!");
                btn.disabled = false;
                btn.innerText = "লগইন করুন";
            }
        }
    </script>
</body>
</html>
