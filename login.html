<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SojiDa | Login to Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card {
            width: 90%; max-width: 400px; padding: 40px 25px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }
        .login-card h1 { font-family: 'Orbitron', sans-serif; color: #fe2c55; font-size: 35px; margin-bottom: 10px; }
        .input-box { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; border-radius: 12px; color: #fff; }
        .login-btn { width: 100%; padding: 15px; background: #fe2c55; border: none; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .google-btn { width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 12px; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>SojiDa</h1>
        <p style="color: #888; font-size: 14px; margin-bottom: 25px;">ভিডিও দেখুন, পকেট ভরুন!</p>
        <input type="email" class="input-box" placeholder="ইমেইল এড্রেস">
        <input type="password" class="input-box" placeholder="পাসওয়ার্ড">
        <button class="login-btn">লগ-ইন করুন</button>
        <div style="margin: 15px 0; color: #444;">অথবা</div>
        <button class="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20"> Google দিয়ে প্রবেশ
        </button>
        <p style="margin-top: 20px; font-size: 13px; color: #666;">অ্যাকাউন্ট নেই? <span style="color: #25f4ee;">রেজিস্ট্রেশন করুন</span></p>
    </div>
</body>
</html>
