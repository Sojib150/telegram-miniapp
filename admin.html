<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SojiDa | Admin Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow-y: auto; padding: 20px; background: #0a0a0a; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .admin-card { background: #151515; border: 1px solid #222; padding: 20px; border-radius: 20px; }
        .admin-card h3 { color: var(--secondary); margin-bottom: 15px; font-size: 18px; }
        textarea, input { width: 100%; background: #222; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .action-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .save-btn { background: var(--primary); color: #fff; }
        .view-btn { background: var(--secondary); color: #000; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SojiDa Admin 🛠️</h1>
    </div>

    <div class="admin-grid">
        <div class="admin-card">
            <h3><i class="fa-solid fa-ad"></i> বিজ্ঞাপন সেটিংস</h3>
            <label>অ্যাড কোড (Monetag/Adsterra):</label>
            <textarea id="ad-code-input" rows="5" placeholder="বিজ্ঞাপন স্ক্রিপ্ট এখানে দিন..."></textarea>
            <button class="action-btn save-btn" onclick="updateAdSetting()">বিজ্ঞাপন আপডেট করুন</button>
        </div>

        <div class="admin-card">
            <h3><i class="fa-solid fa-coins"></i> ইনকাম ও রেট</h3>
            <label>প্রতি ভিউ আয় (৳):</label>
            <input type="number" id="income-rate" step="0.01" value="0.10">
            <label>মিনিমাম উইথড্র (৳):</label>
            <input type="number" id="min-withdraw" value="50">
            <button class="action-btn save-btn" onclick="updateRates()">রেট সেভ করুন</button>
        </div>

        <div class="admin-card">
            <h3><i class="fa-solid fa-users"></i> ইউজার কন্ট্রোল</h3>
            <div class="stats"><span>মোট ইউজার:</span> <span id="total-users">Loading...</span></div>
            <input type="text" id="target-uid" placeholder="ইউজার আইডি (UID)">
            <button class="action-btn view-btn" style="margin-bottom: 10px;" onclick="searchUser()">ইউজার চেক করুন</button>
            <button class="action-btn" style="background: #e67e22; color: #fff;" onclick="banUser()">ব্যান / আনব্যান</button>
        </div>
    </div>

    <div id="soji-overlay" class="overlay"></div>
    <div id="soji-alert" class="alert-box">
        <h3 id="alert-title">SojiDa</h3>
        <p id="alert-msg"></p>
        <button onclick="closeSojiAlert()">ঠিক আছে</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>

    <script>
        // সেটিংস লোড করা
        db.collection("settings").doc("app_config").onSnapshot(doc => {
            if(doc.exists) {
                const data = doc.data();
                document.getElementById('ad-code-input').value = data.adCode || '';
                document.getElementById('income-rate').value = data.perViewIncome || 0.10;
                document.getElementById('min-withdraw').value = data.minWithdraw || 50;
            }
        });

        // ইউজার সংখ্যা গণনা
        db.collection("users").onSnapshot(snap => {
            document.getElementById('total-users').innerText = snap.size;
        });

        async function updateAdSetting() {
            const code = document.getElementById('ad-code-input').value;
            await db.collection("settings").doc("app_config").set({ adCode: code }, { merge: true });
            sojiAlert("বিজ্ঞাপন সফলভাবে আপডেট করা হয়েছে!");
        }

        async function updateRates() {
            const rate = parseFloat(document.getElementById('income-rate').value);
            const min = parseInt(document.getElementById('min-withdraw').value);
            await db.collection("settings").doc("app_config").set({
                perViewIncome: rate,
                minWithdraw: min
            }, { merge: true });
            sojiAlert("ইনকাম রেট সেভ হয়েছে!");
        }

        async function banUser() {
            const uid = document.getElementById('target-uid').value;
            if(!uid) return sojiAlert("ইউজার আইডি দিন!");
            const userRef = db.collection("users").doc(uid);
            const doc = await userRef.get();
            if(doc.exists) {
                const currentStatus = doc.data().status;
                const newStatus = currentStatus === 'banned' ? 'active' : 'banned';
                await userRef.update({ status: newStatus });
                sojiAlert(`ইউজার এখন ${newStatus === 'banned' ? 'ব্যান' : 'আনব্যান'} হয়েছে।`);
            } else {
                sojiAlert("এই ইউজারকে খুঁজে পাওয়া যায়নি!");
            }
        }
    </script>
</body>
</html>
