<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Border Guardian: Monetag Pro</title>
    <!-- Monetag Script (আপনার অরিজিনাল স্ক্রিপ্ট এখানে থাকবে) -->
    <script src='https://alwingulla.com/tag.min.js' data-zone='9931551' async data-p='9931551'></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        .hud {
            position: absolute; top: 10px; width: 100%; display: flex; 
            justify-content: space-around; color: #00ff88; font-size: 16px; pointer-events: none;
            text-shadow: 0 0 10px #00ff88; z-index: 10;
        }

        /* Ad & Shop Buttons */
        .btn-container { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 30; }
        .action-btn {
            padding: 10px 20px; background: #f1c40f; border-radius: 30px; 
            font-weight: bold; cursor: pointer; border: 2px solid #fff; color: #000;
        }
        #ad-btn { background: #00d4ff; }

        /* Shop UI */
        #shop-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; background: rgba(0, 0, 0, 0.95); border: 2px solid #00ff88;
            padding: 20px; display: none; flex-direction: column; gap: 15px; z-index: 40;
            border-radius: 15px; color: #fff;
        }
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .buy-btn { background: #00ff88; border: none; padding: 8px 12px; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hud">
        <div>CASH: ৳<span id="cash">0</span></div>
        <div id="lvl-rank">RANK: ELITE</div>
        <div>SCORE: <span id="score">0</span></div>
    </div>

    <div class="btn-container">
        <div id="ad-btn" class="action-btn" onclick="watchAdForCash()">📺 FREE ৳500</div>
        <div id="shop-btn" class="action-btn" onclick="toggleShop()">🛒 SHOP</div>
    </div>

    <div id="shop-menu">
        <h2 style="color:#00ff88; text-align:center; margin:0;">UPGRADE SHOP</h2>
        <div class="shop-item"><span>Fast Fire (৳500)</span><button class="buy-btn" onclick="buyUpgrade('fire')">BUY</button></div>
        <div class="shop-item"><span>Triple Shot (৳2000)</span><button class="buy-btn" onclick="buyUpgrade('triple') Bryan">BUY</button></div>
        <button style="margin-top:10px; background:#ff0055; color:#fff; border:none; padding:10px; border-radius:5px;" onclick="toggleShop()">CLOSE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    // --- Monetag Ad Function ---
    function watchAdForCash() {
        if (typeof show_9931551 === 'function') {
            isPaused = true; // অ্যাড চলার সময় গেম পজ
            show_9931551().then(() => {
                // রিওয়ার্ড লজিক
                money += 500;
                document.getElementById('cash').innerText = money;
                alert('অভিনন্দন! আপনি ৳৫০০ বোনাস পেয়েছেন।');
                isPaused = false;
                loop();
            }).catch((e) => {
                alert('বিজ্ঞাপনটি লোড হতে পারেনি। আবার চেষ্টা করুন।');
                isPaused = false;
                loop();
            });
        } else {
            alert('বিজ্ঞাপন এখন উপলভ্য নয়।');
        }
    }

    // --- গেম লজিক ---
    const bg = new Image(); bg.src = 'https://i.imgur.com/k2xOUh8.png';
    const ship = new Image(); ship.src = 'https://i.imgur.com/Y4ASFoJ.png';
    const enemyImg = new Image(); enemyImg.src = 'https://i.imgur.com/N6RSQ0V.jpeg';

    let score = 0, money = 0, frame = 0, isPaused = false;
    let fireDelay = 12, hasTripleShot = false;

    const player = { x: canvas.width/2-35, y: canvas.height-180, w: 70, h: 70 };
    const bullets = [], enemies = [], coins = [];

    function toggleShop() {
        isPaused = !isPaused;
        document.getElementById('shop-menu').style.display = isPaused ? 'flex' : 'none';
        if(!isPaused) loop();
    }

    function buyUpgrade(type) {
        if(type === 'fire' && money >= 500) { money -= 500; fireDelay = 7; alert("ফায়ার স্পিড বেড়েছে!"); }
        else if(type === 'triple' && money >= 2000) { money -= 2000; hasTripleShot = true; alert("ট্রিপল শট আনলকড!"); }
        else { alert("পর্যাপ্ত টাকা নেই!"); }
        document.getElementById('cash').innerText = money;
    }

    window.addEventListener('touchmove', e => { if(!isPaused) player.x = e.touches[0].clientX - player.w/2; });

    function loop() {
        if(isPaused) return;
        frame++;
        
        ctx.drawImage(bg, 0, (frame % canvas.height), canvas.width, canvas.height);
        ctx.drawImage(bg, 0, (frame % canvas.height) - canvas.height, canvas.width, canvas.height);
        ctx.drawImage(ship, player.x, player.y, player.w, player.h);

        if(frame % fireDelay === 0) {
            bullets.push({x: player.x + 10, y: player.y});
            bullets.push({x: player.x + player.w - 15, y: player.y});
            if(hasTripleShot) bullets.push({x: player.x + player.w/2 - 2, y: player.y - 10});
        }

        bullets.forEach((b, i) => {
            b.y -= 15;
            ctx.fillStyle = "#00ffff";
            ctx.fillRect(b.x, b.y, 4, 15);
            if(b.y < 0) bullets.splice(i, 1);
        });

        if(frame % 50 === 0) enemies.push({x: Math.random()*(canvas.width-60), y: -60, w: 60, h: 60});
        enemies.forEach((e, ei) => {
            e.y += 4;
            ctx.drawImage(enemyImg, e.x, e.y, e.w, e.h);
            bullets.forEach((bi, i) => {
                if(bi.x > e.x && bi.x < e.x+e.w && bi.y < e.y+e.h) {
                    enemies.splice(ei, 1); bullets.splice(i, 1);
                    score += 10; document.getElementById('score').innerText = score;
                    coins.push({x: e.x + e.w/2, y: e.y});
                }
            });
        });

        coins.forEach((cn, ci) => {
            cn.y += 5;
            ctx.fillStyle = "#ffd700";
            ctx.beginPath(); ctx.arc(cn.x, cn.y, 10, 0, 7); ctx.fill();
            if(cn.y > player.y && Math.abs(cn.x - (player.x + player.w/2)) < 50) {
                money += 50; document.getElementById('cash').innerText = money;
                coins.splice(ci, 1);
            }
        });

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
