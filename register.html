<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SojiDa | Join Us</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 30px; background: #000; }
        .auth-card { background: #111; padding: 25px; border-radius: 25px; border: 1px solid #222; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h1 { font-size: 32px; color: var(--primary); letter-spacing: 2px; }
        .auth-header p { color: #555; font-size: 14px; margin-top: 5px; }
        
        .input-box { position: relative; margin-bottom: 15px; }
        .input-box i { position: absolute; left: 15px; top: 15px; color: #555; }
        .input-box input { width: 100%; background: #1a1a1a; border: 1px solid #222; padding: 15px 15px 15px 45px; border-radius: 12px; color: #fff; outline: none; transition: 0.3s; }
        .input-box input:focus { border-color: var(--secondary); }

        .auth-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .reg-btn { background: var(--primary); color: #fff; }
        .switch-auth { text-align: center; margin-top: 20px; font-size: 14px; color: #888; }
        .switch-auth a { color: var(--secondary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h1>SojiDa</h1>
            <p>আপনার সৃজনশীলতা শুরু হোক এখানে</p>
        </div>

        <div class="auth-card">
            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="reg-name" placeholder="আপনার নাম">
            </div>
            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="reg-email" placeholder="ইমেইল অ্যাড্রেস">
            </div>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="reg-pass" placeholder="পাসওয়ার্ড তৈরি করুন">
            </div>
            <button class="auth-btn reg-btn" id="reg-submit" onclick="handleRegister()">অ্যাকাউন্ট তৈরি করুন</button>
        </div>

        <p class="switch-auth">ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="login.html">লগইন করুন</a></p>
    </div>

    <div id="soji-overlay" class="overlay"></div>
    <div id="soji-alert" class="alert-box"><h3 id="alert-title">SojiDa</h3><p id="alert-msg"></p><button onclick="closeSojiAlert()">ঠিক আছে</button></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>

    <script>
        async function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const btn = document.getElementById('reg-submit');

            if(!name || !email || !pass) return sojiAlert("সবগুলো ঘর পূরণ করুন!");

            btn.disabled = true;
            btn.innerText = "প্রসেসিং...";

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                const user = userCredential.user;

                // ইউজারের ডিসপ্লে নেম আপডেট
                await user.updateProfile({ displayName: name });

                // ফায়ারবেস ফায়ারস্টোরে ইউজার প্রোফাইল ও ওয়ালেট তৈরি
                await db.collection("users").doc(user.uid).set({
                    uid: user.uid,
                    name: name,
                    email: email,
                    balance: 0.00,
                    photo: "",
                    bio: "I love SojiDa",
                    followers: 0,
                    following: 0,
                    status: "active",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                sojiAlert("আপনার অ্যাকাউন্ট তৈরি হয়েছে!", "অভিনন্দন!");
                setTimeout(() => location.href = 'index.html', 2000);
            } catch (error) {
                sojiAlert(error.message);
                btn.disabled = false;
                btn.innerText = "অ্যাকাউন্ট তৈরি করুন";
            }
        }
    </script>
</body>
</html>
