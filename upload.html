<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SojiDa | Upload Video</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .upload-card {
            width: 100%; max-width: 500px; background: #111; padding: 30px; 
            border-radius: 20px; border: 1px dashed #333; text-align: center; margin-top: 50px;
        }
        .upload-icon { font-size: 50px; color: #fe2c55; margin-bottom: 15px; }
        .file-input { display: none; }
        .custom-file-upload { 
            background: #fe2c55; color: white; padding: 12px 25px; 
            border-radius: 10px; cursor: pointer; display: inline-block; font-weight: bold;
        }
        .input-field { width: 100%; padding: 12px; margin-top: 20px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; }
        .post-btn { width: 100%; padding: 15px; background: #25f4ee; border: none; border-radius: 10px; color: #000; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="color: white; margin-top: 20px;">নতুন ভিডিও ছাড়ুন</h2>

    <div class="upload-card">
        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
        <p style="color: #888; margin-bottom: 20px;">ভিডিও ফাইল সিলেক্ট করুন (MP4)</p>
        <label for="video-upload" class="custom-file-upload">ফাইল বেছে নিন</label>
        <input id="video-upload" type="file" class="file-input" accept="video/*">
    </div>

    <div style="width: 100%; max-width: 500px;">
        <input type="text" class="input-field" placeholder="ভিডিওর ক্যাপশন লিখুন...">
        <input type="text" class="input-field" placeholder="#Hashtags (যেমন: #SojiDa #Fun)">
        <button class="post-btn">পাবলিশ করুন</button>
    </div>

    <nav class="app-bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="messages.html" class="nav-item"><i class="fa-solid fa-message"></i><span>Chat</span></a>
        <a href="upload.html" class="nav-item active"><div class="plus-icon"><i class="fa-solid fa-plus"></i></div></a>
        <a href="wallet.html" class="nav-item"><i class="fa-solid fa-wallet"></i><span>Earning</span></a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>Profile</span></a>
    </nav>

</body>
</html>
