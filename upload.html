<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SojiDa | Upload</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="padding: 20px;">
    <h2 style="margin-bottom: 20px;">ভিডিও আপলোড</h2>
    
    <div onclick="document.getElementById('v-input').click()" style="width:100%; height:200px; border:2px dashed #333; border-radius:20px; display:flex; align-items:center; justify-content:center; flex-direction:column; background:#111;">
        <i class="fa-solid fa-cloud-arrow-up" style="font-size:40px; color:#25f4ee;"></i>
        <p style="margin-top:10px; color:#888;">ভিডিও ফাইল সিলেক্ট করুন</p>
        <input type="file" id="v-input" accept="video/*" hidden>
    </div>

    <textarea id="caption" placeholder="ক্যাপশন লিখুন..." style="width:100%; background:#111; border:1px solid #333; color:#fff; padding:15px; border-radius:15px; margin-top:20px; outline:none; height:100px;"></textarea>

    <div id="prog-box" style="display:none; margin-top:20px;">
        <div style="width:100%; height:8px; background:#222; border-radius:10px; overflow:hidden;">
            <div id="prog-fill" style="width:0%; height:100%; background:var(--secondary);"></div>
        </div>
        <p id="prog-text" style="text-align:right; font-size:12px; margin-top:5px; color:#888;">0%</p>
    </div>

    <button id="up-btn" onclick="uploadVideo()" style="width:100%; padding:18px; background:var(--primary); border:none; border-radius:15px; color:#fff; font-weight:bold; margin-top:20px; font-size:16px;">পাবলিশ করুন</button>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
    <script>
        function uploadVideo() {
            const file = document.getElementById('v-input').files[0];
            if(!file) return sojiAlert("আগে ভিডিও সিলেক্ট করুন!");

            const btn = document.getElementById('up-btn');
            const box = document.getElementById('prog-box');
            const fill = document.getElementById('prog-fill');
            const txt = document.getElementById('prog-text');

            btn.disabled = true;
            btn.innerText = "আপলোড হচ্ছে...";
            box.style.display = 'block';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'sojida_videos');

            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://api.cloudinary.com/v1_1/dlpwdx288/video/upload', true);

            xhr.upload.onprogress = (e) => {
                const percent = Math.round((e.loaded / e.total) * 100);
                fill.style.width = percent + '%';
                txt.innerText = percent + '%';
            };

            xhr.onload = async () => {
                if(xhr.status === 200) {
                    const res = JSON.parse(xhr.responseText);
                    await db.collection("videos").add({
                        url: res.secure_url,
                        caption: document.getElementById('caption').value,
                        creatorId: auth.currentUser.uid,
                        creatorName: auth.currentUser.displayName || "SojiDa User",
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    sojiAlert("সাফল্যের সাথে পোস্ট হয়েছে!", "সফল!");
                    setTimeout(() => location.href='index.html', 2000);
                } else {
                    sojiAlert("আপলোড ফেইল! ক্লাউডিনারি চেক করুন।");
                    btn.disabled = false;
                }
            };
            xhr.send(formData);
        }
    </script>
</body>
</html>
