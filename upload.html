<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SojiDa | Create</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .upload-container { padding: 20px; padding-bottom: 100px; }
        .upload-card { background: #111; border-radius: 20px; padding: 20px; border: 1px dashed #333; text-align: center; margin-bottom: 20px; }
        .upload-card i { font-size: 40px; color: var(--secondary); margin-bottom: 10px; }
        
        .preview-box { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 15px; display: none; margin-bottom: 20px; overflow: hidden; }
        .preview-box video { width: 100%; height: 100%; object-fit: cover; }

        .setting-row { display: flex; justify-content: space-between; align-items: center; background: #151515; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .setting-row label { font-size: 14px; color: #eee; }
        
        select, textarea { background: #151515; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 10px; width: 100%; outline: none; margin-bottom: 15px; }
        textarea { height: 80px; resize: none; }

        .publish-btn { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; }
        
        /* Progress Bar */
        .progress-container { display: none; margin-top: 15px; background: #222; border-radius: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 8px; background: var(--secondary); transition: 0.3s; }
    </style>
</head>
<body>

    <div class="header" style="padding: 15px; display: flex; align-items: center; gap: 15px;">
        <i class="fa-solid fa-xmark" onclick="history.back()" style="font-size: 22px;"></i>
        <h2>পোস্ট তৈরি করুন</h2>
    </div>

    <div class="upload-container">
        <input type="file" id="video-input" accept="video/*" hidden>
        
        <div class="upload-card" id="drop-zone" onclick="document.getElementById('video-input').click()">
            <i class="fa-solid fa-video"></i>
            <p id="status-text">ভিডিও ফাইল সিলেক্ট করুন</p>
        </div>

        <div class="preview-box" id="preview-box">
            <video id="preview-vid" controls></video>
        </div>

        <textarea id="up-caption" placeholder="ক্যাপশন লিখুন... #SojiDa #Viral"></textarea>

        <div class="setting-row">
            <label><i class="fa-solid fa-earth-americas"></i> কে দেখতে পারবে?</label>
            <select id="up-privacy" style="width: auto; margin-bottom: 0; padding: 5px;">
                <option value="public">Public</option>
                <option value="private">Private</option>
            </select>
        </div>

        <div class="setting-row">
            <label><i class="fa-solid fa-list"></i> ক্যাটাগরি</label>
            <select id="up-category" style="width: auto; margin-bottom: 0; padding: 5px;">
                <option value="entertainment">Entertainment</option>
                <option value="funny">Funny</option>
                <option value="tech">Tech</option>
                <option value="music">Music</option>
            </select>
        </div>

        <div class="setting-row">
            <label><i class="fa-solid fa-comment-slash"></i> কমেন্ট বন্ধ করুন?</label>
            <input type="checkbox" id="up-comment-off">
        </div>

        <div class="progress-container" id="p-container">
            <div id="progress-bar"></div>
        </div>

        <button class="publish-btn" id="pub-btn" onclick="startUpload()">পাবলিশ করুন</button>
    </div>

    <div id="soji-overlay" class="overlay"></div>
    <div id="soji-alert" class="alert-box"><h3 id="alert-title">SojiDa</h3><p id="alert-msg"></p><button onclick="closeSojiAlert()">ঠিক আছে</button></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>

    <script>
        const vInput = document.getElementById('video-input');
        const pBox = document.getElementById('preview-box');
        const pVid = document.getElementById('preview-vid');
        const dz = document.getElementById('drop-zone');
        let selectedFile = null;

        vInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                dz.style.display = 'none';
                pBox.style.display = 'block';
                pVid.src = URL.createObjectURL(selectedFile);
                document.getElementById('status-text').innerText = selectedFile.name;
            }
        };

        async function startUpload() {
            if(!selectedFile) return sojiAlert("আগে একটি ভিডিও সিলেক্ট করুন!");

            const user = auth.currentUser;
            const btn = document.getElementById('pub-btn');
            const pBar = document.getElementById('progress-bar');
            const pContainer = document.getElementById('p-container');

            btn.disabled = true;
            btn.innerText = "আপলোড হচ্ছে...";
            pContainer.style.display = 'block';

            // ১. ক্লাউডিনারি আপলোড (dlpwdx288)
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('upload_preset', 'sojida_videos'); // আপনার ভিডিও প্রেসেট আইডি

            try {
                // আমরা Fetch ব্যবহার করছি যাতে প্রোগ্রেস ট্র্যাকিং সহজ হয়
                const response = await fetch('https://api.cloudinary.com/v1_1/dlpwdx288/video/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if(data.secure_url) {
                    pBar.style.width = "100%";
                    
                    // ২. ফায়ারবেস ডেটা সেভ
                    await db.collection("videos").add({
                        url: data.secure_url,
                        caption: document.getElementById('up-caption').value,
                        privacy: document.getElementById('up-privacy').value,
                        category: document.getElementById('up-category').value,
                        commentDisabled: document.getElementById('up-comment-off').checked,
                        creatorId: user.uid,
                        creatorName: user.displayName || "SojiDa User",
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        likes: 0,
                        views: 0,
                        likedBy: []
                    });

                    sojiAlert("আপনার ভিডিও সফলভাবে পাবলিশ হয়েছে!", "অভিনন্দন!");
                    setTimeout(() => location.href = 'index.html', 2000);
                }
            } catch (error) {
                sojiAlert("আপলোড ব্যর্থ হয়েছে! আবার চেষ্টা করুন।");
                btn.disabled = false;
                btn.innerText = "পাবলিশ করুন";
            }
        }
    </script>
</body>
</html>
