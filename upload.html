<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SojiDa | Upload Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #fe2c55; --secondary: #25f4ee; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: #fff; display: flex; flex-direction: column; height: 100vh; }

        /* Header */
        .header { padding: 20px; text-align: center; border-bottom: 0.5px solid #222; }
        .header h1 { font-size: 20px; color: var(--primary); letter-spacing: 1px; }

        /* Form Container */
        .upload-container { flex: 1; padding: 30px 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .file-input-wrapper {
            border: 2px dashed #333; border-radius: 15px; padding: 40px 20px;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .file-input-wrapper:active { border-color: var(--secondary); background: #111; }
        .file-input-wrapper i { font-size: 40px; color: #555; margin-bottom: 10px; }
        .file-input-wrapper p { font-size: 14px; color: #888; }
        #video-file { display: none; }

        textarea {
            width: 100%; height: 120px; background: #111; border: 1px solid #222;
            border-radius: 12px; color: #fff; padding: 15px; font-size: 15px; resize: none;
            outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--primary); }

        .publish-btn {
            background: var(--primary); color: #fff; border: none; padding: 16px;
            border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 15px rgba(254, 44, 85, 0.3); transition: 0.3s;
        }
        .publish-btn:disabled { background: #444; cursor: not-allowed; }

        /* Custom Alert UI */
        #alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: none; }
        #custom-alert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 1px solid #333; padding: 25px; border-radius: 20px;
            z-index: 10000; text-align: center; width: 85%; max-width: 320px; display: none;
        }
        #custom-alert h2 { color: var(--primary); font-size: 18px; margin-bottom: 10px; }
        #custom-alert p { color: #ccc; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        #custom-alert button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; }

        /* Nav */
        .bottom-nav { height: 65px; border-top: 0.5px solid #222; display: flex; justify-content: space-around; align-items: center; }
        .nav-link { color: #555; text-decoration: none; font-size: 10px; text-align: center; }
        .nav-link i { display: block; font-size: 20px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="header"><h1>SOJIDA UPLOAD</h1></div>

    <div class="upload-container">
        <label for="video-file" class="file-input-wrapper" id="drop-area">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p id="file-name">ভিডিও সিলেক্ট করতে এখানে ক্লিক করুন</p>
            <input type="file" id="video-file" accept="video/*">
        </label>

        <textarea id="caption" placeholder="ভিডিওর ক্যাপশন বা হ্যাসট্যাগ লিখুন..."></textarea>

        <button class="publish-btn" id="upload-btn" onclick="processUpload()">পাবলিশ করুন</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i>Home</a>
        <a href="upload.html" class="nav-link" style="color: white;"><i class="fa-solid fa-square-plus"></i>Upload</a>
        <a href="profile.html" class="nav-link"><i class="fa-solid fa-user"></i>Profile</a>
    </nav>

    <div id="alert-overlay"></div>
    <div id="custom-alert">
        <h2 id="alert-title">SojiDa</h2>
        <p id="alert-message"></p>
        <button id="alert-btn" onclick="closeSojiAlert()">ঠিক আছে</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBeCWMtjRiLaHhWiP-grW_8QDTRxf8ULLs",
            authDomain: "sojida.firebaseapp.com",
            databaseURL: "https://sojida-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sojida",
            storageBucket: "sojida.firebasestorage.app",
            messagingSenderId: "194824640211",
            appId: "1:194824640211:web:2149cd020f898f40996626"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ফাইল সিলেক্ট করলে নাম দেখানো
        document.getElementById('video-file').onchange = function() {
            document.getElementById('file-name').innerText = this.files[0].name;
            document.getElementById('file-name').style.color = "#25f4ee";
        };

        async function processUpload() {
            const file = document.getElementById('video-file').files[0];
            const caption = document.getElementById('caption').value;
            const btn = document.getElementById('upload-btn');

            if (!file) return showSojiAlert("দয়া করে একটি ভিডিও সিলেক্ট করুন।", "Oops!");
            if (!auth.currentUser) return showSojiAlert("ভিডিও আপলোড করতে আগে লগইন করুন।", "Login Required");

            btn.disabled = true;
            btn.innerText = "আপলোড হচ্ছে...";
            showSojiAlert("আপনার ভিডিওটি প্রসেস হচ্ছে, কিছু সময় অপেক্ষা করুন।", "Uploading...");

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'video_upload'); // আপনার Unsigned Preset

            try {
                // আপনার সঠিক Cloud Name: dlpwdx288
                const response = await fetch('https://api.cloudinary.com/v1_1/dlpwdx288/video/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (data.secure_url) {
                    await db.collection("videos").add({
                        url: data.secure_url,
                        caption: caption,
                        creatorId: auth.currentUser.uid,
                        creatorName: auth.currentUser.displayName || "SojiDa Creator",
                        views: 0,
                        likes: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    showSojiAlert("আপনার ভিডিওটি সফলভাবে পাবলিশ হয়েছে!", "অভিনন্দন!");
                    setTimeout(() => { window.location.href = "index.html"; }, 2000);
                } else {
                    throw new Error(data.error ? data.error.message : "Upload Failed");
                }
            } catch (err) {
                console.error(err);
                showSojiAlert("আপলোড ব্যর্থ হয়েছে। Cloudinary সেটিংস চেক করুন।", "Error!");
                btn.disabled = false;
                btn.innerText = "পাবলিশ করুন";
            }
        }

        function showSojiAlert(msg, title) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-message').innerText = msg;
            document.getElementById('alert-overlay').style.display = 'block';
            document.getElementById('custom-alert').style.display = 'block';
        }

        function closeSojiAlert() {
            document.getElementById('alert-overlay').style.display = 'none';
            document.getElementById('custom-alert').style.display = 'none';
        }
    </script>
</body>
</html>
