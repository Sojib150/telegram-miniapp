<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SojiDa | Wallet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .wallet-card {
            margin: 20px; padding: 30px;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border-radius: 25px; border: 1px solid #222;
            text-align: center; position: relative; overflow: hidden;
        }
        .wallet-card::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(37,244,238,0.05) 0%, transparent 70%);
        }
        .balance-label { color: #888; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .balance-amount { font-size: 48px; font-weight: bold; color: var(--secondary); margin: 10px 0; }
        
        .withdraw-section { padding: 20px; }
        .method-card {
            background: #111; padding: 15px; border-radius: 15px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 15px;
            border: 1px solid #222; cursor: pointer;
        }
        .method-card i { font-size: 24px; color: var(--primary); }
        .method-info h4 { font-size: 15px; }
        .method-info p { font-size: 11px; color: #666; }

        .history-list { padding: 0 20px; margin-top: 10px; }
        .history-item {
            display: flex; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid #111;
        }
        .history-item span { font-size: 13px; color: #aaa; }
        .history-item .status-pending { color: #e67e22; }
        .history-item .status-success { color: #2ecc71; }
    </style>
</head>
<body>

    <div class="header" style="padding: 15px; text-align: center;">
        <h2>আমার ওয়ালেট</h2>
    </div>

    <div class="wallet-card">
        <p class="balance-label">বর্তমান ব্যালেন্স</p>
        <h1 class="balance-amount" id="main-balance">0.00 ৳</h1>
        <p style="font-size: 12px; color: #555;">৫ সেকেন্ড ভিডিও = ০.১০ ৳</p>
    </div>

    <div class="withdraw-section">
        <h3 style="margin-bottom: 15px; font-size: 16px;">টাকা তোলার মাধ্যম</h3>
        
        <div class="method-card" onclick="openWithdraw('bkash')">
            <i class="fa-solid fa-mobile-screen-button"></i>
            <div class="method-info">
                <h4>bKash / Nagad</h4>
                <p>পার্সোনাল নাম্বারে পেমেন্ট নিন</p>
            </div>
        </div>

        <div class="method-card" onclick="openWithdraw('mobile_recharge')">
            <i class="fa-solid fa-bolt"></i>
            <div class="method-info">
                <h4>Mobile Recharge</h4>
                <p>যেকোনো সিমে রিচার্জ নিন</p>
            </div>
        </div>

        <button class="publish-btn" style="margin-top: 10px;" onclick="sojiAlert('আগে মাধ্যম সিলেক্ট করুন!')">রিকোয়েস্ট পাঠান</button>
    </div>

    <div class="history-list">
        <h3 style="font-size: 16px; margin-bottom: 10px;">লেনদেনের ইতিহাস</h3>
        <div id="payout-history">
            <p style="color: #333; text-align: center; font-size: 12px;">কোনো ইতিহাস পাওয়া যায়নি</p>
        </div>
    </div>

    <div id="withdraw-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="w-title">Withdraw</h3>
                <i class="fa-solid fa-xmark" onclick="closeWithdraw()"></i>
            </div>
            <div style="padding-top: 20px;">
                <input type="number" id="w-amount" placeholder="টাকার পরিমাণ (মিনিমাম ৫০)" style="background: #222; border: none; padding: 15px; width: 100%; border-radius: 10px; color: #fff;">
                <input type="text" id="w-number" placeholder="আপনার নাম্বার দিন" style="background: #222; border: none; padding: 15px; width: 100%; border-radius: 10px; color: #fff; margin-top: 10px;">
                <button class="publish-btn" style="margin-top: 20px;" onclick="submitWithdraw()">কনফার্ম করুন</button>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="messages.html" class="nav-link"><i class="fa-solid fa-comment-dots"></i><span>Chat</span></a>
        <a href="upload.html" class="nav-link"><div class="plus-btn"><i class="fa-solid fa-plus"></i></div></a>
        <a href="wallet.html" class="nav-link active"><i class="fa-solid fa-wallet"></i><span>Wallet</span></a>
        <a href="profile.html" class="nav-link"><i class="fa-solid fa-user"></i><span>Profile</span></a>
    </nav>

    <div id="soji-overlay" class="overlay"></div>
    <div id="soji-alert" class="alert-box"><h3 id="alert-title">SojiDa</h3><p id="alert-msg"></p><button onclick="closeSojiAlert()">ঠিক আছে</button></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>

    <script>
        let selectedMethod = '';

        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    if(doc.exists) {
                        const bal = doc.data().balance || 0;
                        document.getElementById('main-balance').innerText = bal.toFixed(2) + " ৳";
                    }
                });
                loadHistory(user.uid);
            }
        });

        function openWithdraw(method) {
            selectedMethod = method;
            document.getElementById('w-title').innerText = method.toUpperCase() + " Withdraw";
            document.getElementById('withdraw-modal').style.bottom = "0";
        }

        function closeWithdraw() {
            document.getElementById('withdraw-modal').style.bottom = "-100%";
        }

        async function submitWithdraw() {
            const amount = parseFloat(document.getElementById('w-amount').value);
            const number = document.getElementById('w-number').value;
            const currentBal = parseFloat(document.getElementById('main-balance').innerText);

            if(!amount || !number) return sojiAlert("সবগুলো ঘর পূরণ করুন!");
            if(amount < 50) return sojiAlert("সর্বনিম্ন ৫০ টাকা হতে হবে!");
            if(amount > currentBal) return sojiAlert("আপনার ব্যালেন্স যথেষ্ট নয়!");

            // ডাটাবেসে রিকোয়েস্ট পাঠানো
            await db.collection("withdraw_requests").add({
                uid: auth.currentUser.uid,
                userName: auth.currentUser.displayName || "SojiDa User",
                amount: amount,
                number: number,
                method: selectedMethod,
                status: "pending",
                time: firebase.firestore.FieldValue.serverTimestamp()
            });

            // ইউজারের ব্যালেন্স থেকে টাকা কেটে নেওয়া
            await db.collection("users").doc(auth.currentUser.uid).update({
                balance: firebase.firestore.FieldValue.increment(-amount)
            });

            sojiAlert("আপনার রিকোয়েস্ট পাঠানো হয়েছে। ২৪ ঘণ্টার মধ্যে পেমেন্ট পাবেন।", "সফল!");
            closeWithdraw();
        }

        function loadHistory(uid) {
            db.collection("withdraw_requests").where("uid", "==", uid)
              .orderBy("time", "desc").limit(5).onSnapshot(snap => {
                const container = document.getElementById('payout-history');
                if(snap.empty) return;
                container.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="history-item">
                            <span>${data.amount}৳ (${data.method})</span>
                            <span class="status-${data.status}">${data.status.toUpperCase()}</span>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
