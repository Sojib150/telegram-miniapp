<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SojiDa | My Wallet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; padding: 20px; }
        .balance-card {
            background: linear-gradient(135deg, #fe2c55, #3a7bd5);
            padding: 30px; border-radius: 25px; text-align: center; color: white;
            box-shadow: 0 10px 20px rgba(254, 44, 85, 0.3);
        }
        .withdraw-section { margin-top: 30px; background: #111; padding: 20px; border-radius: 20px; }
        .method-box { display: flex; justify-content: space-between; margin-top: 15px; }
        .method { 
            background: #222; padding: 10px; border-radius: 10px; width: 30%; 
            text-align: center; border: 1px solid #333; font-size: 12px; cursor: pointer;
        }
        .method.active { border-color: #25f4ee; background: #25f4ee11; }
        .withdraw-btn { width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="balance-card">
        <p style="opacity: 0.8;">মোট ইনকাম (Balance)</p>
        <h1 style="font-size: 40px; margin: 10px 0;">৳ <span id="user-balance">540.50</span></h1>
        <p style="font-size: 13px;"><i class="fa-solid fa-eye"></i> আজ ভিডিও ভিউ হয়েছে: 1,240</p>
    </div>

    <div class="withdraw-section">
        <h3 style="color: #25f4ee;">টাকা উত্তোলন করুন</h3>
        <div class="method-box">
            <div class="method active">বিকাশ</div>
            <div class="method">নগদ</div>
            <div class="method">Binance</div>
        </div>
        <input type="number" class="input-field" placeholder="টাকার পরিমাণ (মিনিমাম ৫০০৳)" style="width: 100%; padding: 12px; margin-top: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 10px;">
        <input type="text" class="input-field" placeholder="আপনার নম্বরটি দিন" style="width: 100%; padding: 12px; margin-top: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 10px;">
        <button class="withdraw-btn">টাকা পাঠানোর রিকোয়েস্ট দিন</button>
    </div>

    <nav class="app-bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="messages.html" class="nav-item"><i class="fa-solid fa-message"></i><span>Chat</span></a>
        <a href="upload.html" class="nav-item"><div class="plus-icon"><i class="fa-solid fa-plus"></i></div></a>
        <a href="wallet.html" class="nav-item active"><i class="fa-solid fa-wallet"></i><span>Earning</span></a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>Profile</span></a>
    </nav>

</body>
</html>
