<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SojiDa - Video Sharing</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="top-nav">
        <span>SojiDa</span>
        <div class="top-tabs">
            <span>Following</span>
            <span class="active">For You</span>
        </div>
    </div>

    <div id="video-feed" class="video-container">
        <div class="loading">লোডিং ভিডিও...</div>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-home"></i>
        <i class="fas fa-search"></i>
        <label for="video-upload" class="upload-btn">
            <i class="fas fa-plus"></i>
        </label>
        <input type="file" id="video-upload" accept="video/*" style="display:none;">
        <i class="fas fa-comment-dots"></i>
        <i class="fas fa-user" onclick="showProfile()"></i>
    </div>

    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <p id="upload-status">ভিডিও আপলোড হচ্ছে...</p>
            <div class="progress-bar"><div id="progress" class="progress"></div></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script src="app.js"></script>
</body>
</html>
