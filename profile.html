<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SojiDa | প্রোফাইল</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #fe2c55; --secondary: #25f4ee; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; }

        /* Profile Header */
        .header { padding: 50px 20px 20px; text-align: center; background: linear-gradient(180deg, #1a1a1a, #000); }
        .avatar-box { width: 100px; height: 100px; margin: 0 auto 15px; position: relative; }
        .avatar-box img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); padding: 3px; object-fit: cover; }
        .v-badge { position: absolute; bottom: 5px; right: 5px; color: var(--secondary); background: #000; border-radius: 50%; font-size: 16px; }

        .name-section h2 { font-size: 20px; font-weight: 600; }
        .name-section p { color: #888; font-size: 14px; margin-bottom: 20px; }

        /* Stats Row */
        .stats { display: flex; justify-content: space-around; margin-bottom: 25px; border-top: 1px solid #222; padding-top: 20px; }
        .stat-item { text-align: center; }
        .stat-item h3 { font-size: 18px; }
        .stat-item p { font-size: 11px; color: #777; text-transform: uppercase; }

        /* Buttons */
        .action-btns { display: flex; gap: 10px; padding: 0 20px; margin-bottom: 30px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .btn-edit { background: #222; color: white; border: 1px solid #333; }
        .btn-share { background: var(--primary); color: white; }
        .btn-logout { width: 50px; background: #1a1a1a; color: #888; border: 1px solid #333; border-radius: 8px; }

        /* Video Tabs */
        .tabs { display: flex; border-bottom: 1px solid #222; }
        .tab { flex: 1; padding: 15px; text-align: center; color: #555; font-size: 22px; cursor: pointer; }
        .tab.active { color: white; border-bottom: 2px solid white; }

        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; min-height: 200px; }
        .grid-item { aspect-ratio: 9/16; background: #111; position: relative; }
        .no-video { grid-column: span 3; text-align: center; padding: 50px; color: #444; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: #888; text-decoration: none; text-align: center; font-size: 10px; }
        .nav-link.active { color: white; }
        .nav-link i { display: block; font-size: 20px; margin-bottom: 2px; }
        .plus-btn { width: 45px; height: 30px; background: linear-gradient(90deg, var(--secondary), var(--primary)); border-radius: 8px; color: black; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="avatar-box">
            <img src="https://via.placeholder.com/150" id="user-img">
            <i class="fa-solid fa-circle-check v-badge"></i>
        </div>
        <div class="name-section">
            <h2 id="u-name">SojiDa Creator</h2>
            <p id="u-handle">@sojida_user</p>
        </div>

        <div class="stats">
            <div class="stat-item"><h3>250</h3><p>Following</p></div>
            <div class="stat-item"><h3>1.5K</h3><p>Followers</p></div>
            <div class="stat-item"><h3>12K</h3><p>Likes</p></div>
        </div>

        <div class="action-btns">
            <button class="btn btn-edit">Edit Profile</button>
            <button class="btn btn-share">Share</button>
            <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active"><i class="fa-solid fa-grip"></i></div>
        <div class="tab"><i class="fa-solid fa-heart"></i></div>
        <div class="tab"><i class="fa-solid fa-bookmark"></i></div>
    </div>

    <div class="video-grid" id="v-grid">
        <div class="no-video">কোনো ভিডিও আপলোড করা হয়নি</div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i>Home</a>
        <a href="messages.html" class="nav-link"><i class="fa-solid fa-comment"></i>Chat</a>
        <a href="upload.html" class="nav-link"><div class="plus-btn"><i class="fa-solid fa-plus"></i></div></a>
        <a href="wallet.html" class="nav-link"><i class="fa-solid fa-wallet"></i>Earning</a>
        <a href="profile.html" class="nav-item active nav-link"><i class="fa-solid fa-user"></i>Profile</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBeCWMtjRiLaHhWiP-grW_8QDTRxf8ULLs",
            authDomain: "sojida.firebaseapp.com",
            databaseURL: "https://sojida-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sojida",
            storageBucket: "sojida.firebasestorage.app",
            messagingSenderId: "194824640211",
            appId: "1:194824640211:web:2149cd020f898f40996626"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                // ডাটাবেস থেকে তথ্য আনা
                db.collection("users").doc(user.uid).get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('u-name').innerText = data.name || "SojiDa User";
                        document.getElementById('u-handle').innerText = "@" + user.uid.substring(0,8);
                    }
                });
            } else {
                // লগইন করা না থাকলে রিডাইরেক্ট (ডিমো দেখার জন্য এটা অফ রাখতে পারেন)
                // window.location.href = "login.html";
            }
        });

        function logout() {
            auth.signOut().then(() => { window.location.href = "login.html"; });
        }
    </script>
</body>
</html>
