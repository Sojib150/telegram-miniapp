<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SojiDa | Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#000; color:#fff;">
    <div style="text-align:center; padding:50px 20px;">
        <img id="u-img" src="https://via.placeholder.com/100" style="width:100px; height:100px; border-radius:50%; border:2px solid #25f4ee;">
        <h2 id="u-name" style="margin-top:15px;">লোড হচ্ছে...</h2>
        <p id="u-balance" style="color:#25f4ee; font-size:20px; margin-top:10px;">0.00 ৳</p>
        <button onclick="auth.signOut()" style="margin-top:30px; padding:10px 25px; border-radius:10px; border:none; background:#fe2c55; color:#fff;">লগআউট</button>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i>Home</a>
        <a href="upload.html" class="nav-link"><div class="plus-btn"><i class="fa-solid fa-plus"></i></div></a>
        <a href="profile.html" class="nav-link active"><i class="fa-solid fa-user"></i>Profile</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
    <script>
        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    if(doc.exists) {
                        const d = doc.data();
                        document.getElementById('u-name').innerText = d.name || "SojiDa User";
                        document.getElementById('u-balance').innerText = (d.balance || 0).toFixed(2) + " ৳";
                    }
                });
            }
        });
    </script>
</body>
</html>
